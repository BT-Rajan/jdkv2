<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Restrictive CSP: no inline scripts, no third-party script sources, no
      framing (clickjacking protection), and connect-src limited to same
      origin + the configured API. Adjust connect-src if VITE_API_BASE_URL
      points somewhere other than what's listed here in production builds.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' http://localhost:8000 https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>JDK Manufacturing Operations Platform</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
